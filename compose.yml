services:
  postgres:
    image: postgres:18-alpine
    container_name: ucp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: ucp
    ports:
      - "6432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./migrations/001_init_schema.sql:/docker-entrypoint-initdb.d/001_init_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ucp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
